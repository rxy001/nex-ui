name: Visual Tests

on:
  push:
    paths:
      - 'packages/**'
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Install
        uses: ./.github/common-actions/install

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_TOKEN }}
